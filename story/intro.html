<html>
<head>
  <title>Dreamers</title>

  <style>
    body {
      margin: 0;
      background-color: black;
    }

    /* Container to hold image like a background */
    .map-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Make image behave like background */
    .map-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* makes it act like background-size: cover */
    }
  </style>
</head>

<body>

<div class="map-container">
  <img src="Screenshot 2026-04-14 145431.png">
</div>


</body>
</html>
