<html>
<head>
  <title>Dreamers</title>

  <style>
   
    /* Container to stack button + text */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px; /* space between button and text */
    }

    #demo {
      border-right: 3px solid white;
      padding-right: 5px;
      white-space: nowrap;
      overflow: hidden;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: 1px solid white;
      cursor: pointer;
    }
  </style>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
</head>

<body>

<h1>Enjoy</h1>

<div class="container">
  <button onclick="typeWriter()">press to read</button>
  <p id="demo"></p>
</div>

<script>
var i = 0;
var txt = 'WARNING: the start screen contains flashing background, please be advised and have fun';
var speed = 50;
var typing = false;

function typeWriter() {
  if (typing) return;

  typing = true;
  i = 0;
  document.getElementById("demo").innerHTML = "";

  function type() {
    if (i < txt.length) {
      document.getElementById("demo").innerHTML += txt.charAt(i);
      i++;
      setTimeout(type, speed);
    } else {
      typing = false;
    }
  }

  type();
}
</script>

</body>
</html>
